plot_settings:
  save_plot: true
  geometry: nanorod # or other geometries, 'sphere', 'nanorod', etc.
  material: silver
  excitation_position_nm: initial # or 'initial', 'middle', etc.
  filename: "${plot_settings.geometry}_${plot_settings.material}_${plot_settings.excitation_position_nm}_pr_comparison.png"
  dpi: 400
  show: false
  tight_layout: true
  grid: false # Enable grid for true, or False to disable
  legend: true # set to true to show legend
  figsize: [8.0, 6.0]

  # Choose by indices OR by time (ps)
  x_range_ps: [0.0, 150.0]
  # x_index_range: [0, 500]

  xlabel: "t (ps)"
  ylabel: "PR (site basis)"
  title: null # or choose your own title, "Silver; Middle Excitation — PR"
  xscale: linear
  yscale: linear
  xlim: [0,150]
  ylim: [0, Null]

  font:
    family: null        # e.g. "DejaVu Sans", "Times New Roman"; null keeps default
    labelsize: 18
    ticksize: 18
    legendsize: 18
    titlesize: 18
    labelweight: bold   # "normal" or "bold"
    legendweight: bold  # "normal" or "bold"
    tickweight: bold     # "normal" or "bold"

  # If your file stores ipr_std (disorder avg), shade ±1σ
  shade_std: true

  # Optional time unit conversion (keep 1.0 if already ps)
  x_scale_factor: 1.0

  lw: 2
