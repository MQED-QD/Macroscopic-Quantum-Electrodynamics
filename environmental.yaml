name: mqed

channels:
  - conda-forge
  - defaults

dependencies:
  # anchor the interpreter; change to 3.11 if you prefer that series
  - python

  # numerics / data
  - numpy
  - scipy
  - pandas
  - h5py
  - lmdb

  # viz / notebooks
  - matplotlib
  - seaborn
  - jupyter
  - pillow
  - tqdm
  - pyqt

  # quantum / simulation stack
  - qutip
  - mpb
  - pymeep
  - h5utils
  - harminv
  - fftw
  - gsl
  - cairo

  # multiprocess
  - joblib

  # mpi
  - openmpi
  - mpi4py

  # testing
  - pytest

  # pip (loose like your example; pin major if you want)
  - pip>=23
  - pip:
      - hydra-core
      - hydra-colorlog
      - hydra-optuna-sweeper
      - optuna
      - rootutils
      - gitpython
      - loguru
      - sphinx
      - sphinx-rtd-theme
      - rich
      - pyvista[all]
      - sqlalchemy
      - alembic
      - openpyxl
